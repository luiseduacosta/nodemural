<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estagiários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-2">

        <div id="menu-container"></div>

        <h1>Estagiários</h1>

        <table class="editable-table table table-striped table-bordered style='width: 100%;'">
            <thead>
                <tr>
                    <th style="width: 50px;">ID</th>
                    <th style="width: 200px;">Aluno</th>
                    <th style="width: 200px;">Instituição</th>
                    <th style="width: 50px;">Periodo</th>
                    <th style="width: 50px;">Nível</th>
                    <th style="width: 50px;">Nota</th>
                    <th style="width: 50px;">CH</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="estagiario-table-body">
                <!-- As linhas da tabela serão inseridas aqui pelo JavaScript -->
            </tbody>
        </table>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="docente_estagiarios_notas.js" type="module"></script>
    <script src="menu.js" type="module"></script>

</body>
</html>
