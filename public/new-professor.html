<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Professor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
</head>

<body>

    <div class="container mt-2">

        <div id="menu-container"></div>

        <h1 class="mb-4">Novo(a) Professor(a)</h1>

        <div class="card">
            <div class="card-body">
                <form id="newProfessorForm">
                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Siape</label>
                            <input type="text" class="form-control" id="siape" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">CRESS</label>
                            <input type="text" class="form-control" id="cress">
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Região</label>
                            <input type="text" class="form-control" id="regiao">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Celular</label>
                            <input type="text" class="form-control" id="celular">
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="telefone">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Ingresso</label>
                            <input type="date" class="form-control" id="dataingresso">
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Departamento</label>
                            <select class="form-select" id="departamentoId" required>
                                <option value="">Selecione o departamento</option>
                                <option value="Fundamentos">Fundamentos</option>
                                <option value="Métodos e técnicas">Métodos e técnicas</option>
                                <option value="Política social">Política social</option>
                                <option value="Outras áreas" default>Outras áreas</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Currículo Lattes</label>
                            <input type="text" class="form-control" id="curriculolattes">
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Atualização do Currículo</label>
                            <input type="date" class="form-control" id="atualizacaolattes">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Data de Egresso</label>
                            <input type="date" class="form-control" id="dataegresso">
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Motivo de Egresso</label>
                            <input type="text" class="form-control" id="motivoegresso">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-12">
                            <label class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes"></textarea>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a href="professores.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Inputmask should be loaded as a regular script (not a module) so it attaches to jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.8/jquery.inputmask.min.js"></script>
    <script src="menu.js" type="module"></script>
    <script src="new-professor.js" type="module"></script>

</body>

</html>
