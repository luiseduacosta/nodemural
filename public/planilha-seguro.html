<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-2">

    <div id="menu-container"></div>

    <h1>Planilha Seguro</h1>

    <div class="row mb-3">
        <div class="col-md-3">
            <label for="periodoFilter" class="form-label fw-bold">Período:</label>
            <select id="periodoFilter" class="form-select">
                <option value="">Carregando...</option>
            </select>
        </div>
    </div>

    <table id="planilha-seguro-table" class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Aluno</th>
                <th>CPF</th>
                <th>Nascimento</th>
                <th>Registro</th>
                <th>Nível</th>
                <th>Ajuste 2020</th>
                <th>Periodo</th>
                <th>Início</th>
                <th>Final</th>
                <th>Instituição</th>
            </tr>
        </thead>
        <tbody>
            <!-- Populated by JS -->
        </tbody>
    </table>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu.js" type="module"></script>
    <script src="planilha-seguro.js" type="module"></script>
</body>
</html>
